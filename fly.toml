# Fly.io config for the AppTok backend.
# Secrets (TAVILY_API_KEY, UMANS_API_KEYS, YOUTUBE_API_KEY, etc.) are set via
# `fly secrets set` — never committed here.
app = "apptok"
primary_region = "lhr"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8787"
  # Real Cursor builds: the cursor-agent CLI is baked into the image (Dockerfile).
  CURSOR_ENABLED = "true"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  # 2gb so up to 2 concurrent cursor-agent builds don't OOM the box.
  size = "shared-cpu-2x"
  memory = "2gb"
