# Fly.io config for the AppTok backend.
# Secrets (TAVILY_API_KEY, UMANS_API_KEYS, YOUTUBE_API_KEY, etc.) are set via
# `fly secrets set` — never committed here.
app = "apptok"
primary_region = "lhr"

[build]

[env]
  HOST = "0.0.0.0"
  PORT = "8787"
  # Real Cursor builds: the cursor-agent CLI is baked into the image (Dockerfile).
  CURSOR_ENABLED = "true"
  # High concurrency for many approvals. 16 fits comfortably in 4gb (~200MB/build);
  # bump toward 20 only if memory headroom allows.
  MAX_CONCURRENT_BUILDS = "16"

[http_service]
  internal_port = 8787
  force_https = true
  # Keep the machine ALWAYS running — the idea feed + builds live in memory, so
  # auto-stopping on idle wipes them (and the frontend then shows un-buildable
  # mock seeds). Stay up so state persists between requests.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  # 4gb for high concurrency of cursor-agent builds (many approvals at once).
  size = "shared-cpu-4x"
  memory = "4gb"
